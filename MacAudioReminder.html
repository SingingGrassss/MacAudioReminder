<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mac 定时提醒配置工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #f5f7fa;
        }
        .container {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }
        h2 {
            color: #2d3748;
            margin-bottom: 18px;
            font-size: 18px;
        }
        .form-row {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #4a5568;
            font-size: 14px;
        }
        select, input[type="time"], button {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        button {
            background: #3182ce;
            color: #fff;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background: #2b6cb0;
        }
        .danger-btn {
            background: #e53e3e;
        }
        .danger-btn:hover {
            background: #c53030;
        }
        .remind-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            background: #f7fafc;
            border-radius: 6px;
            margin: 8px 0;
        }
        .item-info {
            font-size: 14px;
            color: #2d3748;
        }
        .item-ops button {
            width: auto;
            height: 32px;
            padding: 0 10px;
            margin-left: 6px;
        }
        .code-box {
            background: #1a202c;
            color: #e2e8f0;
            padding: 14px;
            border-radius: 6px;
            margin-top: 16px;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
        }
        .tip {
            font-size: 13px;
            color: #718096;
            margin-top: 8px;
        }
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }
        .lang-select {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .lang-select label {
            font-size: 14px;
            color: #4a5568;
        }
        .lang-select select {
            width: auto;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="lang-select">
            <label for="langSelect" id="langSelectLabel">语言</label>
            <select id="langSelect" onchange="changeLanguage(event)">
                <option value="zh">中文</option>
                <option value="en">English</option>
            </select>
        </div>
    </div>
    <div class="container">
        <h2 id="addTitle">➕ 添加定时提醒</h2>
        <div class="form-row">
            <label id="audioLabel">选择音频文件</label>
            <input type="file" id="audioInput" accept="audio/*" style="display:none;">
            <button type="button" id="audioButton" onclick="openAudioPicker()">选择本地音频文件</button>
            <div id="audioInfo" class="tip" style="margin-top:8px;">未选择音频</div>
        </div>
        <div class="form-row">
            <label id="timeLabel">提醒时间</label>
            <input type="time" id="timeInput">
        </div>
        <div class="form-row">
            <label id="playCountLabel">播放次数</label>
            <input type="number" id="playCountInput" min="1" max="100" value="1" style="width: 100%; height: 40px; padding: 0 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px;">
        </div>
        <button onclick="addReminder()" id="saveBtn">保存提醒</button>
    </div>

    <div class="container">
        <h2 id="listTitle">📋 已设置的提醒</h2>
        <div id="remindList"></div>
    </div>

    <div class="container">
        <h2 id="cmdTitle">⚙️ 一键部署命令</h2>
        <p class="tip" id="cmdTip">复制下方全部代码，打开终端粘贴执行，立即生效</p>
        <div class="code-box" id="cmdBox">暂无配置</div>
        <button onclick="copyCode()" style="margin-top:10px;" id="copyBtn">复制命令</button>
    </div>

<script>
    const i18n = {
        zh: {
            title: 'Mac 定时提醒配置工具',
            addTitle: '➕ 添加定时提醒',
            audioLabel: '选择音频文件',
            audioButton: '选择本地音频文件',
            audioInfo: '未选择音频',
            timeLabel: '提醒时间',
            playCountLabel: '播放次数',
            saveBtn: '保存提醒',
            listTitle: '📋 已设置的提醒',
            noReminders: '暂无提醒',
            cmdTitle: '⚙️ 一键部署命令',
            cmdTip: '复制下方全部代码，打开终端粘贴执行，立即生效',
            copyBtn: '复制命令',
            deleteBtn: '删除',
            langLabel: '语言',
            alertChooseFile: '请选择本地音频文件',
            alertChooseTime: '请选择时间',
            alertDuplicate: '已存在相同提醒'
        },
        en: {
            title: 'Mac Audio Reminder Setup Tool',
            addTitle: '➕ Add Reminder',
            audioLabel: 'Select audio file',
            audioButton: 'Choose local audio file',
            audioInfo: 'No audio selected',
            timeLabel: 'Reminder time',
            playCountLabel: 'Play count',
            saveBtn: 'Save reminder',
            listTitle: '📋 Scheduled reminders',
            noReminders: 'No reminders yet',
            cmdTitle: '⚙️ Deploy command',
            cmdTip: 'Copy all code below, paste into Terminal to activate.',
            copyBtn: 'Copy command',
            deleteBtn: 'Delete',
            langLabel: 'Language',
            alertChooseFile: 'Please select a local audio file',
            alertChooseTime: 'Please select a time',
            alertDuplicate: 'A reminder with same audio and time already exists'
        }
    };
    let remindList = JSON.parse(localStorage.getItem('macRemindList')) || [];
    let currentAudio = "";
    let currentAudioName = "";
    let currentLang = 'zh';
    const shellPath = "$HOME/bin";
    const agentPath = "$HOME/Library/LaunchAgents";

    window.onload = function(){
        const audioInput = document.getElementById('audioInput');
        audioInput.addEventListener('change', handleAudioSelect);
        loadLanguage();
        renderList();
        generateCmd();
    }

    function loadLanguage(){
        const savedLang = localStorage.getItem('macRemindLang');
        if(savedLang && i18n[savedLang]){
            currentLang = savedLang;
        }
        document.getElementById('langSelect').value = currentLang;
        applyLanguage();
    }

    function changeLanguage(event){
        const selected = event.target.value;
        if(i18n[selected]){
            currentLang = selected;
            localStorage.setItem('macRemindLang', selected);
            applyLanguage();
        }
    }

    function applyLanguage(){
        const t = i18n[currentLang];
        document.title = t.title;
        document.getElementById('addTitle').innerText = t.addTitle;
        document.getElementById('audioLabel').innerText = t.audioLabel;
        document.getElementById('audioButton').innerText = t.audioButton;
        document.getElementById('audioInfo').innerText = currentAudioName ? currentAudioName : t.audioInfo;
        document.getElementById('timeLabel').innerText = t.timeLabel;
        document.getElementById('saveBtn').innerText = t.saveBtn;
        document.getElementById('playCountLabel').innerText = t.playCountLabel;
        document.getElementById('listTitle').innerText = t.listTitle;
        document.getElementById('cmdTitle').innerText = t.cmdTitle;
        document.getElementById('cmdTip').innerText = t.cmdTip;
        document.getElementById('copyBtn').innerText = t.copyBtn;
        document.getElementById('langSelectLabel').innerText = t.langLabel;
        renderList();
    }

    function openAudioPicker(){
        document.getElementById('audioInput').click();
    }

    function handleAudioFile(file){
        if(!file){
            currentAudio = "";
            currentAudioName = "";
            document.getElementById('audioInfo').innerText = '未选择音频';
            return;
        }
        currentAudio = file.path || file.name;
        currentAudioName = file.name;
        document.getElementById('audioInfo').innerText = currentAudioName;
    }

    function handleAudioSelect(event){
        handleAudioFile(event.target.files[0]);
        event.target.value = '';
    }

    function addReminder(){
        const t = i18n[currentLang];
        const audio = currentAudio;
        const time = document.getElementById('timeInput').value;
        const playCount = parseInt(document.getElementById('playCountInput').value) || 1;
        if(!audio){ alert(t.alertChooseFile); return; }
        if(!time){ alert(t.alertChooseTime); return; }
        const [h, m] = time.split(":" );
        const name = currentAudioName || audio.split("/").pop();
        const id = `rem_${Date.now()}`;

        const exist = remindList.some(item=> item.audio===audio && item.h===h && item.m===m);
        if(exist){ alert(t.alertDuplicate); return; }

        remindList.push({ id, audio, audioName: name, h, m, timeStr: time, playCount });
        localStorage.setItem('macRemindList', JSON.stringify(remindList));
        renderList();
        generateCmd();
        document.getElementById('timeInput').value = "";
        document.getElementById('playCountInput').value = "1";
    }

    function delRemind(id){
        remindList = remindList.filter(item=>item.id !== id);
        localStorage.setItem('macRemindList', JSON.stringify(remindList));
        renderList();
        generateCmd();
    }

    function renderList(){
        const wrap = document.getElementById('remindList');
        const t = i18n[currentLang];
        if(remindList.length === 0){
            wrap.innerHTML = `<p class="tip">${t.noReminders}</p>`;
            return;
        }
        let html = "";
        remindList.forEach(item=>{
            const playCount = item.playCount || 1;
            html += `
            <div class="remind-item">
                <div class="item-info"><strong>${item.timeStr}</strong> | ${item.audioName} (${playCount}x)</div>
                <div class="item-ops"><button class="danger-btn" onclick="delRemind('${item.id}')">${t.deleteBtn}</button></div>
            </div>`;
        });
        wrap.innerHTML = html;
    }

    function generateCmd(){
        let cmd = "";
        cmd += `setopt no_nomatch\n`;
        cmd += `launchctl bootout gui/$UID ${agentPath}/com.harry.play*.plist 2>/dev/null || true\n`;
        cmd += `rm -f ${agentPath}/com.harry.play*.plist 2>/dev/null || true\n`;
        cmd += `rm -f ${shellPath}/play_*.sh 2>/dev/null || true\n\n`;

        remindList.forEach((item, idx)=>{
            const shortName = item.audioName.replace(".mp3","");
            const shFile = `${shellPath}/play_${shortName}_${idx}.sh`;
            const plistFile = `${agentPath}/com.harry.play${shortName}${idx}.plist`;
            const label = `com.harry.play${shortName}${idx}`;
            const playCount = item.playCount || 1;

            cmd += `cat > ${shFile} << 'SHELL_EOF'\n`;
            cmd += `#!/bin/zsh\nMP3="${item.audio}"\nfor i in {1..${playCount}}; do afplay "\$MP3"; sleep 0.5; done\n`;
            cmd += `SHELL_EOF\nchmod +x ${shFile}\n\n`;

            cmd += `cat > ${plistFile} << 'PLIST_EOF'\n`;
            cmd += `<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
  <key>Label</key><string>${label}</string>
  <key>ProgramArguments</key><array><string>${shFile}</string></array>
  <key>StartCalendarInterval</key>
  <dict>
  <key>Hour</key><integer>${item.h}</integer>
  <key>Minute</key><integer>${item.m}</integer>
  </dict>
</dict>
</plist>\n`;
            cmd += `PLIST_EOF\n\n`;
            cmd += `launchctl bootstrap gui/\$UID ${plistFile} 2>/dev/null || true\n\n`;
        })
        document.getElementById('cmdBox').innerText = cmd;
    }

    function copyCode(){
        const code = document.getElementById('cmdBox').innerText;
        const textarea = document.createElement('textarea');
        textarea.value = code;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        alert("已复制！打开终端粘贴执行即可");
    }
</script>
</body>
</html>
